<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Nie znaleziono strony</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* --- STYL GŁÓWNY (ZGODNY Z INDEX) --- */
        :root { --bg-main: #000000; --glass-base: rgba(255, 255, 255, 0.05); --accent: #e0ddcf; --text-main: #f5f5f7; --text-secondary: #b0aeb5; --radius-l: 24px; --radius-m: 14px; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; background-image: radial-gradient(circle at top left, #1c1c1e, #000000); }

        /* NAWIGACJA */
        nav { background-color: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); height: 70px; padding: 0 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { height: 40px; width: auto; display: block; object-fit: contain; }
        .desktop-menu { display: flex; align-items: center; position: absolute; left: 50%; transform: translateX(-50%); height: 100%; }
        .desktop-menu a { color: var(--text-secondary); text-decoration: none; padding: 0 15px; font-size: 1rem; font-weight: 500; transition: all 0.3s ease; }
        .desktop-menu a:hover, .desktop-menu a.active { color: var(--accent); background-color: rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 30px; padding: 10px 22px; margin: 0 5px; }
        .hamburger { display: none; flex-direction: column; justify-content: center; align-items: flex-end; width: 40px; height: 40px; background: transparent; border: none; cursor: pointer; z-index: 1001; padding: 0; margin-top: -6px; position: relative; }
        .hamburger span { display: block; width: 24px; height: 3px; background-color: #e0ddcf !important; margin: 3px 0; border-radius: 3px; transition: 0.3s; }
        .mobile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: rgba(10, 10, 10, 0.6); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding-left: 40px; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        .mobile-overlay.open { opacity: 1; pointer-events: auto; }
        .mobile-links a { display: block; font-size: 2rem; font-weight: 700; color: var(--accent); text-decoration: none; margin-bottom: 30px; transform: translateY(20px); opacity: 0; transition: 0.4s; text-align: left; }
        .mobile-overlay.open .mobile-links a { transform: translateY(0); opacity: 1; }
        .close-menu { all: unset; position: absolute; top: 15px; right: 20px; font-size: 3rem; color: var(--accent); cursor: pointer; z-index: 1002; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: transparent !important; border: none !important; box-shadow: none !important; }
        .close-menu:hover { opacity: 0.8; background: transparent !important; box-shadow: none !important; }
        .flip-icon { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; width: 44px; height: 44px; border-radius: 50%; background-color: transparent; transition: background-color 0.3s; cursor: pointer; margin-left: 10px; }
        .flip-icon:hover { background-color: rgba(255, 255, 255, 0.15); }
        .flip-icon img { display: block; width: 24px; transition: transform 0.6s ease-in-out; }
        .flip-icon:hover img { transform: rotateY(360deg); }

        /* KONTENER 404 */
        .container { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            max-width: 1200px; width: 90%; margin: 40px auto; padding: 60px 50px; 
            background-color: var(--glass-base); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
            border-radius: var(--radius-l); text-align: center; 
        }
        
        /* DUŻY NUMER BŁĘDU */
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(224, 221, 207, 0.3);
        }

        h2 { color: var(--text-main); margin-top: 10px; margin-bottom: 20px; font-size: 1.8rem; }
        p { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; max-width: 600px; }

        button { background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(224, 221, 207, 0.1)); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); color: var(--text-main); padding: 15px 35px; border-radius: 99px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; margin-top: 30px; display: inline-block; width: auto; }
        button:hover { background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(224, 221, 207, 0.2)); transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        footer { text-align: center; padding: 30px; color: rgba(255,255,255,0.2); flex-shrink: 0; }

        /* ANIMACJE SCROLLOWANIA */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) { .desktop-menu { display: none; } .hamburger { display: flex; } .nav-logo { height: 32px; } nav { padding: 0 15px; height: 60px; } .container { width: 100%; margin: 25px 0; border-radius: 0; padding: 40px 25px; background-color: transparent; backdrop-filter: none; border: none; box-shadow: none; } .error-code { font-size: 4rem; } }
    </style>
</head>
<body>
    <nav>
        <a href="/"><img src="logo.png" alt="Logo" class="nav-logo"></a>
        <div class="desktop-menu">
            <a href="/">Strona Główna</a>
            <a href="/portfolio">Portfolio</a>
            <a href="/o-mnie">O mnie</a>
            <a href="/kontakt">Kontakt</a>
            <a href="/index-en" class="flip-icon"><img src="https://flagcdn.com/w40/gb.png" alt="EN"></a>
        </div>
        <button class="hamburger" onclick="toggleMenu()"><span></span><span></span></button>
    </nav>

    <div id="mobileOverlay" class="mobile-overlay">
        <button class="close-menu" onclick="toggleMenu()">&times;</button>
        <div class="mobile-links">
            <a href="/">Strona Główna</a>
            <a href="/portfolio">Portfolio</a>
            <a href="/o-mnie">O mnie</a>
            <a href="/kontakt">Kontakt</a>
            <a href="/index-en" style="margin-top: 20px; display:inline-block;"><img src="https://flagcdn.com/w40/gb.png" style="width: 30px;" alt="EN"></a>
        </div>
    </div>

    <div class="container reveal">
        <div class="error-code">404</div>
        <h2>Ups! Nie znaleziono strony.</h2>
        <p>Wygląda na to, że strona, której szukasz, została przeniesiona lub nie istnieje.</p>
        <button onclick="location.href='/'">Wróć na stronę główną</button>
    </div>

    <footer>© 2024 Twoje Imię i Nazwisko</footer>
    <script>
        function toggleMenu() { document.getElementById('mobileOverlay').classList.toggle('open'); }
        
        // ANIMACJE SCROLLOWANIA
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("visible");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();

        // Ustaw aktywną zakładkę w menu (404 nie ma aktywnej, ale na wszelki wypadek)
        (function() {
            const currentPath = window.location.pathname;
            const menuLinks = document.querySelectorAll('.desktop-menu a:not(.flip-icon)');
            menuLinks.forEach(link => {
                let href = link.getAttribute('href');
                if (href && !href.startsWith('/')) href = '/' + href;
                if (href === currentPath) {
                    link.classList.add('active');
                }
            });
        })();
    </script>
</body>
</html>
